<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NAME}} - Cover Letter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: "Inter", sans-serif;
      font-size: 11pt;
      line-height: 1.25;
      color: #000;
      background: #fff;
    }

    .page {
      max-width: 8.5in;
      margin: 0 auto;
      /* PDF Page Spacing - Adjust this value to control margins in final PDF */
      padding: 0.5in 0.75in;  /* top/bottom 0.5in, left/right 0.75in */
    }

    @page {
      size: Letter portrait;
      margin: 0;  /* Let .page padding control spacing */
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        margin: 0;
        padding: 0;
      }
      .page {
        padding: 0.5in 0.75in;  /* Same as above - controls PDF margins */
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 10pt;
    }

    .name {
      font-size: 24pt;
      font-weight: bold;
      margin-bottom: 2pt;
      color: #1a3a6e;
    }

    .contact {
      font-size: 11pt;
    }

    .contact a {
      color: #0066cc;
      text-decoration: underline;
    }

    .date {
      margin-bottom: 12px;
      font-size: 11pt;
      margin-top: 10pt;
    }

    .content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .content p {
      margin-bottom: 10px;
      text-align: justify;
    }

    .salutation {
      margin-bottom: 10px;
    }

    .closing {
      margin-top: 12px;
    }

    .signature {
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <h1 class="name">YOUR NAME</h1>
      <p class="contact">555-555-5555 | <a href="mailto:your.email@example.com">your.email@example.com</a> | Your City, Province | <a href="https://linkedin.com/in/yourlinkedinprofile">LinkedIn</a> | <a href="https://github.com/yourgithubusername">GitHub</a></p>
    </header>

    <div class="date">{{DATE}}</div>

    <div class="content">
{{COVER_LETTER_CONTENT}}
    </div>
  </div>
</body>
</html>
